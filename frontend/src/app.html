<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon and Icons -->
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Theme and App Meta -->
		<meta name="theme-color" content="#3b82f6" />
		<meta name="description" content="Advanced business productivity suite with MS Access-style database features" />
		<meta name="application-name" content="TPT Titan" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="TPT Titan" />
		<meta property="og:description" content="Advanced business productivity suite with MS Access-style database features" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary" />
		<meta property="twitter:title" content="TPT Titan" />
		<meta property="twitter:description" content="Advanced business productivity suite with MS Access-style database features" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
