version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tpt_titan
      POSTGRES_USER: tpt_user
      POSTGRES_PASSWORD: tpt_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tpt_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://tpt_user:tpt_password@postgres:5432/tpt_titan?sslmode=disable
    depends_on:
      - postgres
    networks:
      - tpt_network
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tpt_network

volumes:
  postgres_data:

networks:
  tpt_network:
    driver: bridge
