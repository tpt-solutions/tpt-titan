version: '3.8'

# TPT Titan with SQLite (default configuration)
# Uses SQLite for simplicity - no external database required
# To use PostgreSQL, see docker-compose.override.yml

services:
  # Backend API (Go/Gin)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/tpt_titan.db
      - JWT_SECRET=development-secret-key-change-in-production
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    networks:
      - tpt_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Svelte)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tpt_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  tpt_network:
    driver: bridge
